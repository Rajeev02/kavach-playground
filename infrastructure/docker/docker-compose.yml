version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kavach_playground_db
    environment:
      POSTGRES_USER: playground_admin
      POSTGRES_PASSWORD: playground_password
      POSTGRES_DB: kavach_playground
    ports:
      - "5433:5432" # Using 5433 to avoid conflicts with core Kavach DB
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
