name: Kavach Playground CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm install
      
    - name: Lint & Type Check
      run: |
        npm run lint --if-present
        # Add tsc check here

  validate-sdks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify Live Web SDK Example
      run: |
        echo "Validating @rajeev02/kavach-web integration..."
        # Add bash script to verify execution of web-example
        
    - name: Verify Live Python SDK Example
      run: |
        echo "Validating rajeev02-kavach-sdk integration..."
        pip install rajeev02-kavach-sdk
        python examples/python-example/demo.py

    - name: Verify Live Go SDK Example
      run: |
        echo "Validating pkg.go.dev/github.com/Rajeev02/kavachid/sdks/kavach-go..."
        cd examples/go-example && go run main.go

  deploy-frontend:
    needs: [validate, validate-sdks]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID}}
          vercel-project-id: ${{ secrets.PROJECT_ID}}
          working-directory: apps/playground
          vercel-args: '--prod'

  deploy-backend:
    needs: [validate, validate-sdks]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "kavach-playground-backend"
